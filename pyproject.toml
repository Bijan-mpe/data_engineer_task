[tool.pytest.ini_options]
pythonpath = ["."]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "integration: tests that require external services such as PostgreSQL",
]
filterwarnings = [
    # openpyxl read-only mode holds a ZipFile reference that Python's GC
    # occasionally closes before the ZipFile finalizer runs — harmless.
    "ignore:.*ZipFile.*:pytest.PytestUnraisableExceptionWarning",
]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "W", "F", "I"]
