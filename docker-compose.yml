services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scope_ratings}
      POSTGRES_USER: ${POSTGRES_USER:-scope}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scope_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-scope_ratings}
      POSTGRES_USER: ${POSTGRES_USER:-scope}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scope_password}
      DATA_DIR: /app/data
      SQLALCHEMY_POOL_SIZE: ${SQLALCHEMY_POOL_SIZE:-5}
      SQLALCHEMY_MAX_OVERFLOW: ${SQLALCHEMY_MAX_OVERFLOW:-10}
      SQLALCHEMY_POOL_TIMEOUT: ${SQLALCHEMY_POOL_TIMEOUT:-30}
      SQLALCHEMY_POOL_RECYCLE: ${SQLALCHEMY_POOL_RECYCLE:-1800}
      RUN_PIPELINE_ON_STARTUP: ${RUN_PIPELINE_ON_STARTUP:-true}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  postgres_data:
